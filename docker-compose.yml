services:
  db:
    image: postgres:15-alpine
    container_name: tripwise-db
    environment:
      POSTGRES_DB: tripwise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tripwise-network

  backend:
    image: ghcr.io/sally033005/tripwise-backend:main
    container_name: tripwise-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tripwise
      DB_USERNAME: postgres
      DB_PASSWORD: password
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - db
    networks:
      - tripwise-network

  frontend:
    image: ghcr.io/sally033005/tripwise-frontend:main
    container_name: tripwise-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend
    networks:
      - tripwise-network

volumes:
  postgres_data:

networks:
  tripwise-network:
    driver: bridge