services:
  db:
    image: postgres:15-alpine
    container_name: tripwise-db
    environment:
      POSTGRES_DB: tripwise
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tripwise-network

  app:
    build: .
    container_name: tripwise-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: tripwise
      DB_USERNAME: postgres
      DB_PASSWORD: password
    depends_on:
      - db
    networks:
      - tripwise-network

volumes:
  postgres_data:

networks:
  tripwise-network:
    driver: bridge